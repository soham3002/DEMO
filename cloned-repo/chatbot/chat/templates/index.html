<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Web App</title>
    <style>
        /* Apply the background image and dark theme */
        body {
            font-family: 'Arial', sans-serif;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlC3tFFCRgKtWBuTUyaZH8ShQGozsYl-2IRg&s'); /* Background image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 0;
        }

        /* Add a semi-transparent overlay to make the text readable */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Dark overlay for better contrast */
        }

        .chat-container {
            max-width: 600px;
            margin: 100px auto;
            background: rgba(50, 50, 50, 0.8); /* Semi-transparent dark background */
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px); /* Adding blur effect behind the container */
        }

        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 30px;
            font-family: 'Verdana', sans-serif;
            color: #1a8a2d; /* Neon green for the heading */
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        .messages {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }

        .user-message {
            background-color: #1a8a2d; /* Dark green background for user messages */
            text-align: right;
            color: neon green;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            flex-direction: row-reverse;
        }

        .bot-message {
            background-color: #333333; /* Dark gray background for bot's messages */
            color: neon green;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .message img {
            width: 40px; /* Set image size in pixels */
            height: 40px; /* Set image size in pixels */
            border-radius: 50%; /* Make the image circular */
            margin: 0 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #444;
            border-radius: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
            background-color: #222;
            color: #fff;
        }

        input[type="text"]:focus {
            border-color: #1a8a2d; /* Green focus border for input */
        }

        button {
            padding: 12px 20px;
            background-color: #1a8a2d; /* Green background for button */
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            margin-top: 15px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2c8a46; /* Darker green on hover */
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-thumb {
            background-color: #555;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background-color: #333;
        }

        /* Typing animation for bot */
        .typing {
            position: relative;
            width: 100%;
            text-align: left;
            padding: 10px 15px;
            background-color: #333;
            border-radius: 10px;
            color: neon green;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .typing:before {
            content: '';
            position: absolute;
            top: 50%;
            left: -25px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: neon green;
            animation: typing 1s infinite step-start;
        }

        .typing:after {
            content: '';
            position: absolute;
            top: 50%;
            left: -15px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: neon green;
            animation: typing 1s infinite 0.5s step-start;
        }

        @keyframes typing {
            0%, 100% {
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
        }

    </style>
</head>
<body>
    <div class="overlay"></div> <!-- Add overlay for background -->
    
    <div class="chat-container">
        <h1>Chat with Harry</h1> <!-- Heading updated with "Harry" as the bot's name -->
        <div class="messages" id="messages"></div>
        <input type="text" id="user_input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            const userInput = document.getElementById("user_input").value;
            if (userInput.trim() === "") return;

            appendMessage(userInput, "user");

            // Simulate bot typing
            const typingDiv = document.createElement("div");
            typingDiv.classList.add("typing");
            typingDiv.id = "typing";
            document.getElementById("messages").appendChild(typingDiv);

            fetch("/ask", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: "user_input=" + encodeURIComponent(userInput)
            })
            .then(response => response.json())
            .then(data => {
                setTimeout(() => {
                    document.getElementById("typing").remove(); // Remove typing indicator
                    appendMessage(data.response, "bot");
                }, 1000); // Simulate a small delay for the bot's response
            });

            document.getElementById("user_input").value = "";
        }
